<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milena Marcowka — Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --burgundy: #600B1F;
      --burgundy-light: #7A1A34;
      --cream: #FAF5F0;
      --warm-beige: #E8DDD3;
      --text-dark: #2C1A0E;
      --white: #FFFFFF;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--warm-beige);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top bar ── */
    .toolbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background-color: var(--cream);
      border-bottom: 1px solid var(--warm-beige);
      box-shadow: 0 1px 8px rgba(44, 26, 14, 0.06);
    }

    .toolbar__left, .toolbar__right {
      display: flex; align-items: center; gap: 1rem; min-width: 0;
    }

    .toolbar__back, .toolbar__download {
      font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; color: var(--burgundy); opacity: 0.7;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .toolbar__back:hover, .toolbar__download:hover { opacity: 1; }

    .toolbar__title {
      font-family: 'EB Garamond', Georgia, serif; font-size: 1.1rem;
      color: var(--burgundy); position: absolute; left: 50%;
      transform: translateX(-50%); white-space: nowrap;
    }

    /* ── Zoom controls ── */
    .zoom-controls { display: flex; align-items: center; gap: 0.4rem; }

    .zoom-btn {
      width: 30px; height: 30px; border: 1px solid var(--warm-beige);
      border-radius: 4px; background: var(--white); color: var(--burgundy);
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: border-color 0.2s, background-color 0.2s;
      line-height: 1;
    }
    .zoom-btn:hover:not(:disabled) { border-color: var(--burgundy); background-color: #FDF8F4; }
    .zoom-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .zoom-level {
      font-size: 0.7rem; color: var(--text-dark); opacity: 0.6; min-width: 3em;
      text-align: center; letter-spacing: 0.03em; border: none; background: none;
      padding: 0; font-family: inherit; cursor: pointer; transition: opacity 0.2s;
    }
    .zoom-level:hover { opacity: 1; text-decoration: underline; }

    /* ── Pages container ── */
    .pages {
      display: flex; flex-direction: column; align-items: center;
      padding: 5rem 1rem 3rem; gap: 1rem; min-width: min-content;
    }

    .page-wrapper {
      background: var(--white); box-shadow: 0 2px 16px rgba(44, 26, 14, 0.08);
      line-height: 0; position: relative; overflow: hidden;
    }

    .page-wrapper canvas {
      display: block; width: 100%; height: auto; filter: contrast(1.08);
    }

    .page-wrapper--loading { display: flex; align-items: center; justify-content: center; }
    .page-wrapper--loading::after {
      content: ''; width: 28px; height: 28px; border: 2px solid var(--warm-beige);
      border-top-color: var(--burgundy); border-radius: 50%;
      animation: spin 0.8s linear infinite; position: absolute;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: var(--cream);
      z-index: 200; transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    
    .loading-overlay__spinner {
      width: 36px; height: 36px; border: 2px solid var(--warm-beige);
      border-top-color: var(--burgundy); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 1.2rem;
    }
    .loading-overlay__text {
      font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--burgundy); opacity: 0.6; text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .toolbar__title { display: none; }
      .pages { padding: 4.5rem 0.5rem 2rem; gap: 0.5rem; }
      .toolbar { padding: 0.6rem 0.75rem; }
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-overlay__spinner"></div>
    <span class="loading-overlay__text" id="loadingText">Laden...</span>
  </div>

  <nav class="toolbar">
    <div class="toolbar__left">
      <a href="index.html" class="toolbar__back">&larr; Terug</a>
    </div>
    <span class="toolbar__title" id="docTitle">Viewer</span>
    <div class="toolbar__right">
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOut" title="Zoom uit">&minus;</button>
        <button class="zoom-level" id="zoomLevel" title="Reset zoom (Ctrl+0)">100%</button>
        <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
      </div>
      <a href="#" class="toolbar__download" id="downloadBtn" download>Download</a>
    </div>
  </nav>

  <main class="pages" id="pages"></main>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    if (!file) {
      window.location.href = 'index.html';
    }

    // Set UI Details
    const titles = {
      'MilenaMarcowka_Portfolio.pdf': 'Portfolio',
      'MilenaMarcowka_CV.pdf': 'Curriculum Vitae',
      'MilenaMarcowka_Masterproef.pdf': 'Masterproef'
    };
    const filename = file.split('/').pop();
    document.getElementById('docTitle').textContent = titles[filename] || filename;
    document.title = `Milena Marcowka \u2014 ${titles[filename] || 'Viewer'}`;
    document.getElementById('downloadBtn').href = file;

    const pagesContainer = document.getElementById('pages');
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const PIXEL_RATIO = window.devicePixelRatio || 1;

    let pdf = null;
    let totalPages = 0;
    let pageData = [];
    const pageStates =[];

    // ── Zoom state ──
    const ZOOM_STEPS =[0.5, 0.75, 1, 1.25, 1.5, 2, 2.5, 3, 4, 5];
    let zoomIndex = 2; // start at 100%
    let currentZoom = 1;

    const zoomLevelEl = document.getElementById('zoomLevel');
    const zoomInBtn = document.getElementById('zoomIn');
    const zoomOutBtn = document.getElementById('zoomOut');

    // FIX: Cap max width to 1100px so 100% zoom doesn't break on 4K monitors
    function getBaseWidth() {
      return Math.min(window.innerWidth - 32, 1100); 
    }

    // ── Safe Initialization ──
    async function initViewer() {
      try {
        const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';

        // FIX: Removed disableStream/disableAutoFetch. Let PDF.js handle range-requests natively!
        const loadingTask = pdfjsLib.getDocument({ url: file });
        
        pdf = await loadingTask.promise;
        totalPages = pdf.numPages;

        // Fetch page 1 dims safely
        const page1 = await pdf.getPage(1);
        const vp1 = page1.getViewport({ scale: 1 });
        page1.cleanup();
        
        const defaultDims = { width: vp1.width, height: vp1.height };
        pageData = Array.from({ length: totalPages }, () => ({ ...defaultDims }));

        setupPages();
        updatePageSizes();
        overlay.classList.add('hidden');

      } catch (error) {
        console.error("PDF Load Error:", error);
        loadingText.textContent = "Fout bij laden van de PDF. Probeer het bestand rechtstreeks te downloaden.";
        document.querySelector('.loading-overlay__spinner').style.display = 'none';
      }
    }

    function setupPages() {
      for (let i = 0; i < totalPages; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper page-wrapper--loading';
        wrapper.dataset.pageNum = i + 1;
        pagesContainer.appendChild(wrapper);

        pageStates.push({
          wrapper,
          rendered: false,
          rendering: false,
          renderTask: null, // FIX: Track render tasks for cancellation
          pageNum: i + 1,
          renderedAtZoom: 0
        });
        observer.observe(wrapper);
      }
    }

    function updatePageSizes() {
      const displayW = getBaseWidth() * currentZoom;
      for (let i = 0; i < totalPages; i++) {
        const aspect = pageData[i].height / pageData[i].width;
        pageStates[i].wrapper.style.width = displayW + 'px';
        pageStates[i].wrapper.style.height = (displayW * aspect) + 'px';
      }
    }

    // ── Lazy rendering with IntersectionObserver ──
    const observer = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (!entry.isIntersecting) continue;
        const num = parseInt(entry.target.dataset.pageNum);
        const state = pageStates[num - 1];
        if (!state.rendered && !state.rendering) {
          renderPage(state);
        }
      }
    }, { rootMargin: '150% 0px' });

    async function renderPage(state) {
      // FIX: If it's already rendering, cancel it so we can re-render at the new zoom scale
      if (state.rendering && state.renderTask) {
        state.renderTask.cancel();
      }

      state.rendering = true;
      const zoomAtRenderStart = currentZoom;

      try {
        const page = await pdf.getPage(state.pageNum);
        const realVp = page.getViewport({ scale: 1 });
        pageData[state.pageNum - 1] = { width: realVp.width, height: realVp.height };
        
        const displayW = getBaseWidth() * zoomAtRenderStart;
        state.wrapper.style.width = displayW + 'px';
        state.wrapper.style.height = (displayW * realVp.height / realVp.width) + 'px';

        const pageWidth = realVp.width;
        const targetScale = (displayW / pageWidth) * PIXEL_RATIO;
        const scale = Math.min(targetScale, 6144 / pageWidth); // Prevent crashing on mobile GPUs

        const renderViewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = renderViewport.width;
        canvas.height = renderViewport.height;

        state.renderTask = page.render({ canvasContext: canvas.getContext('2d'), viewport: renderViewport });
        await state.renderTask.promise;

        page.cleanup();

        const oldCanvas = state.wrapper.querySelector('canvas');
        if (oldCanvas) {
          state.wrapper.replaceChild(canvas, oldCanvas);
        } else {
          state.wrapper.classList.remove('page-wrapper--loading');
          state.wrapper.appendChild(canvas);
        }

        state.rendered = true;
        state.renderedAtZoom = zoomAtRenderStart;

      } catch (err) {
        // Ignore errors caused by intentional task cancellation
        if (err.name !== 'RenderingCancelledException') {
          console.error(`Page ${state.pageNum} render error:`, err);
        }
      } finally {
        state.rendering = false;
        state.renderTask = null;
      }
    }

    // ── Zoom logic ──
    function applyZoom() {
      const scrollYRatio = window.scrollY / (document.documentElement.scrollHeight || 1);
      
      currentZoom = ZOOM_STEPS[zoomIndex];
      zoomLevelEl.textContent = Math.round(currentZoom * 100) + '%';
      zoomInBtn.disabled = zoomIndex >= ZOOM_STEPS.length - 1;
      zoomOutBtn.disabled = zoomIndex <= 0;
      
      updatePageSizes();

      // FIX: Force manual check for re-renders rather than relying on observer hacks
      for (const state of pageStates) {
        if (currentZoom > state.renderedAtZoom * 1.1) {
          state.rendered = false;
          
          // If currently visible in viewport, render it immediately
          const rect = state.wrapper.getBoundingClientRect();
          const isVisible = rect.top < window.innerHeight * 1.5 && rect.bottom > -window.innerHeight * 0.5;
          
          if (isVisible) renderPage(state);
        }
      }

      window.scrollTo(window.scrollX, scrollYRatio * document.documentElement.scrollHeight);
    }

    // Event Listeners
    zoomInBtn.addEventListener('click', () => { if (zoomIndex < ZOOM_STEPS.length - 1) { zoomIndex++; applyZoom(); } });
    zoomOutBtn.addEventListener('click', () => { if (zoomIndex > 0) { zoomIndex--; applyZoom(); } });
    zoomLevelEl.addEventListener('click', () => { zoomIndex = 2; applyZoom(); });

    window.addEventListener('wheel', (e) => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      if (e.deltaY < 0 && zoomIndex < ZOOM_STEPS.length - 1) { zoomIndex++; applyZoom(); } 
      else if (e.deltaY > 0 && zoomIndex > 0) { zoomIndex--; applyZoom(); }
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
        e.preventDefault();
        if (zoomIndex < ZOOM_STEPS.length - 1) { zoomIndex++; applyZoom(); }
      } else if ((e.ctrlKey || e.metaKey) && e.key === '-') {
        e.preventDefault();
        if (zoomIndex > 0) { zoomIndex--; applyZoom(); }
      } else if ((e.ctrlKey || e.metaKey) && e.key === '0') {
        e.preventDefault();
        zoomIndex = 2; applyZoom();
      }
    });

    // Start App
    initViewer();

  </script>

</body>
</html>
